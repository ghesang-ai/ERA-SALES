<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1E3A7A" />
  <title>ERA-SALES — Menunggu Persetujuan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <div class="brand-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#1E3A7A"/>
          <path d="M12 34L20 22L26 28L32 18L36 22" stroke="#F6B93B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="36" cy="14" r="3" fill="#F6B93B"/>
        </svg>
      </div>
      <h1 class="brand-name">ERA-SALES</h1>
    </div>

    <div class="login-card" style="text-align:center;">
      <div style="font-size:3rem;margin-bottom:1rem;">⏳</div>
      <h2 class="login-title">Menunggu Persetujuan</h2>
      <p class="login-desc">Permintaan akses kamu sudah diterima.<br>PIC sedang memverifikasi akun kamu.</p>
      <p id="user-email" style="margin-top:1rem;font-size:0.85rem;color:var(--text-2);background:var(--bg-2);padding:0.5rem 1rem;border-radius:8px;"></p>
      <div style="margin-top:1.5rem;font-size:0.8rem;color:var(--text-3);">
        <div class="spinner" style="width:20px;height:20px;margin:0 auto 0.5rem;"></div>
        Mengecek status secara otomatis...
      </div>
      <button class="btn btn-outline btn-full" id="logout-btn" style="margin-top:1.5rem;">Keluar</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }

      const user = await getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }

      if (user.profile?.status === 'approved' || user.profile?.role === 'admin') {
        window.location.href = 'dashboard.html'; return;
      }

      if (user.profile?.status === 'rejected') {
        document.querySelector('.login-title').textContent = 'Akses Ditolak';
        document.querySelector('.login-desc').textContent = 'Permintaan akses kamu ditolak oleh PIC. Hubungi PIC untuk informasi lebih lanjut.';
        document.querySelector('[style*="spinner"]').parentElement.style.display = 'none';
        return;
      }

      document.getElementById('user-email').textContent = user.email;

      // Auto-cek status setiap 15 detik
      const interval = setInterval(async () => {
        const fresh = await getCurrentUser();
        if (fresh?.profile?.status === 'approved' || fresh?.profile?.role === 'admin') {
          clearInterval(interval);
          window.location.href = 'dashboard.html';
        }
      }, 15000);

      document.getElementById('logout-btn').addEventListener('click', async () => {
        clearInterval(interval);
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
